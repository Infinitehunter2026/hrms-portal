<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Infinite Hunters – HRMS Login</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body>
<div class="login-wrap">
    <div class="login-bg"></div>
    <div class="login-grid-bg"></div>
    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-icon">IH</div>
            <h2>HRMS Portal</h2>
            <p>Infinite Hunters Multi Service</p>
        </div>
        <form onsubmit="loginUser(); return false;">
            <div class="form-group">
                <label class="form-label">User ID *</label>
                <select id="userId" class="form-select" required>
                    <option value="">— Select User —</option>
                    <option value="superadmin">Super Admin</option>
                    <option value="admin">Admin (Onboarding Team)</option>
                    <option value="employee">Employee</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Password *</label>
                <input type="password" id="password" class="form-input" placeholder="Enter your password">
            </div>
            <div id="loginError" style="color:var(--red);font-size:12px;margin-bottom:10px"></div>
            <button type="submit" class="btn btn-gold" style="width:100%;padding:12px;">Login →</button>
        </form>
        <div class="login-footer">© Infinite Hunters Multi Service Pvt. Ltd.</div>
    </div>
</div>
<script>
function loginUser() {
    const role = document.getElementById('userId').value;
    if (!role) { document.getElementById('loginError').textContent = 'Please select a user role'; return; }
    // Role-aware redirect
    if (role === 'superadmin') window.location.href = 'superadmin-dashboard.html';
    else if (role === 'admin') window.location.href = 'admin-dashboard.html';
    else if (role === 'employee') window.location.href = 'employee-dashboard.html';
}
</script>
</body>
</html>
