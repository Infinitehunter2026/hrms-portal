<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="css/mobile.css"><title>Bank Change – HRMS</title><link rel="stylesheet" href="styles.css"></head>
<body>
<nav class="top-nav"><a href="#" class="nav-brand"><div class="nav-brand-icon">IH</div><div class="nav-brand-text"><b>Infinite Hunters</b><small>HRMS Portal</small></div></a><div class="nav-right"><span class="nav-role-badge badge-employee">Employee</span><a href="login.html" class="nav-link-logout">Logout</a></div></nav>
<div class="app-layout">
<aside class="sidebar"><div class="sidebar-section"><div class="sidebar-label">My Portal</div><a href="employee-dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a><a href="payslip.html" class="sidebar-link"><span class="icon">💰</span> Payslip</a><a href="offer-letter.html" class="sidebar-link"><span class="icon">📄</span> Offer Letter</a><a href="ticket.html" class="sidebar-link"><span class="icon">🎫</span> Ticket</a><a href="bank-change.html" class="sidebar-link active"><span class="icon">🏦</span> Bank Change</a></div></aside>
<main class="main-content">
<div class="page-header fade-in"><div class="page-header-left"><div class="page-eyebrow">Account</div><h1 class="page-title">Bank Account <strong>Change Request</strong></h1></div></div>
<div class="card fade-in d1" style="max-width:800px"><div class="card-header"><h3>Employee & Bank Details</h3></div><div class="card-body">
<form action="/submit-bank-change" method="POST" enctype="multipart/form-data">
<div class="section-title"><span class="icon">👤</span> Employee Info</div>
<div class="form-grid">
<div class="form-group"><label class="form-label">Employee Name</label><input type="text" value="Arun Kumar" class="form-input" readonly></div>
<div class="form-group"><label class="form-label">Employee ID</label><input type="text" value="EMP1023" class="form-input" readonly></div>
</div>
<div class="section-title"><span class="icon">🏦</span> New Bank Details</div>
<div class="form-grid">
<div class="form-group"><label class="form-label">Bank Name *</label><input type="text" name="bankName" class="form-input" required></div>
<div class="form-group"><label class="form-label">Account Number *</label><input type="text" name="accountNumber" class="form-input" required></div>
<div class="form-group"><label class="form-label">IFSC Code *</label><input type="text" name="ifsc" class="form-input" required></div>
<div class="form-group"><label class="form-label">Account Holder Name *</label><input type="text" name="accountHolder" class="form-input" required></div>
<div class="form-group full-width"><label class="form-label">Upload Cancelled Cheque / Proof *</label><input type="file" name="bankProof" class="form-input" accept=".jpg,.png,.pdf" required></div>
</div>
<div style="margin-top:20px"><button type="submit" class="btn btn-gold">Submit Request →</button></div>
<div class="note"><strong>Note:</strong> Bank change requests will be verified by HR before approval.</div>
</form></div></div>
</main></div></body></html>
