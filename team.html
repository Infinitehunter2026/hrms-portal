<!DOCTYPE html>
<html>
<head>
<title>Leadership Team - Crystal Bridge</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f7f9;
}
header{
    background:#003366;
    color:white;
    padding:15px;
    text-align:center;
}
.team{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}
.card{
    background:white;
    padding:20px;
    text-align:center;
    border-radius:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.card img{
    width:120px;
    height:120px;
    border-radius:50%;
}
.card h3{
    margin:10px 0 5px;
    color:#007a7a;
}
.card p{
    color:#555;
}
footer{
    background:#003366;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
<h1>Our Leadership Team</h1>
</header>

<div class="team">

<div class="card">
<img src="https://via.placeholder.com/120">
<h3>Mr. Rajesh Kumar</h3>
<p>Managing Director</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/120">
<h3>Ms. Anitha Sharma</h3>
<p>HR Head</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/120">
<h3>Mr. Vivek Rao</h3>
<p>Operations Manager</p>
</div>

</div>

<footer>
© 2026 Crystal Bridge HR India Pvt. Ltd.
</footer>

</body>
</html>
